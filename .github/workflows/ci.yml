name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Backend jobs ──────────────────────────────────────────────────────────────

jobs:
  backend-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

  backend-test:
    name: Backend tests (pytest + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        run: >-
          uv run pytest -q
          --cov=services --cov=vector_store --cov=routers --cov=models
          --cov-report=term-missing --cov-fail-under=90

  backend-container-test:
    name: Backend tests (container)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: test
          load: true
          tags: chatpdf-backend:test
          cache-from: type=gha,scope=backend-test
          cache-to:   type=gha,scope=backend-test,mode=max

      - name: Run pytest inside container
        run: docker run --rm chatpdf-backend:test

# ── Frontend jobs ─────────────────────────────────────────────────────────────

  frontend-lint:
    name: Frontend lint (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  frontend-build:
    name: Frontend build (vue-tsc + vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build

# ── Docker jobs ───────────────────────────────────────────────────────────────

  docker-build:
    name: Docker build (backend + frontend)
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, backend-container-test, frontend-lint, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend production image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: false
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

  integration-test:
    name: Integration smoke test (docker compose)
    runs-on: ubuntu-latest
    needs: [docker-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build and start stack
        run: docker compose up --build -d

      - name: Wait for backend healthy
        run: |
          echo "Waiting for backend to become healthy..."
          timeout 120 bash -c \
            'until docker compose ps backend | grep -q "(healthy)"; do sleep 5; done'
          echo "Backend is healthy."

      - name: Run REST smoke tests
        run: bash scripts/test_core.sh

      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
