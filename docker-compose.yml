services:
  backend:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    ports:
      - "8000:8000"   # direct API access; also proxied by nginx on port 80
    environment:
      # LLM provider keys — set in a .env file or export before running
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY:    ${GOOGLE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-local}
      # Absolute paths inside the container (mapped to the app_data volume)
      CHROMA_DATA_DIR: /data/chroma
      UPLOAD_DIR:      /data/uploads
      SQLITE_URL:      sqlite:////data/chatpdf.db
      # nginx frontend (port 80) + direct backend access (port 8000)
      CORS_ORIGINS: "http://localhost,http://localhost:8000"
    volumes:
      - app_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  app_data:
