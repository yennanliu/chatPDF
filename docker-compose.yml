services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      # LLM provider keys — set in a .env file or export before running
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY:    ${GOOGLE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-local}
      # Absolute paths inside the container (mapped to the app_data volume)
      CHROMA_DATA_DIR: /data/chroma
      UPLOAD_DIR:      /data/uploads
      SQLITE_URL:      sqlite:////data/chatpdf.db
      # Allow requests from the nginx frontend
      CORS_ORIGINS: http://localhost
    volumes:
      - app_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/libraries')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  app_data:
